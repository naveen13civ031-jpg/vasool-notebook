function openLoanHistory(loanId){ ui.modal={type:'loanHistory', payload:{loanId}}; render(); }

function loanHistoryModal(loanId){
  const l = state.loans.find(x=>x.id===loanId);
  const c = getCustomer(l.customerId);
  const s = loanStatus(l);
  const today = todayISO();

  // Build EMI rows: assign collections to EMIs in order
  let remaining = [...(l.collections||[])].sort((a,b)=>a.date.localeCompare(b.date));
  let remAmt = remaining.reduce((s,c)=>s+c.amount, 0);
  let cumEmi = 0;

  const rows = l.payments.map((p, idx)=>{
    cumEmi += p.amount;
    const prevCum = cumEmi - p.amount;
    // How much of this EMI is covered?
    const covered = Math.max(0, Math.min(p.amount, remAmt - prevCum));
    const paidFull = remAmt >= cumEmi;
    const partial = !paidFull && remAmt > prevCum;
    const isNext = !s.completed && s.next && s.next.emiNo === p.emiNo;
    const isOverdue = !paidFull && p.dueDate < today;

    let rowClass = 'row-pending';
    let pill = `<span class="pill pill-pending">Pending</span>`;
    if(paidFull){ rowClass='row-paid'; pill=`<span class="pill pill-paid">✓ Paid</span>`; }
    else if(partial){ rowClass='row-partial'; pill=`<span class="pill pill-partial">Partial</span>`; }
    else if(isOverdue){ rowClass='row-overdue'; pill=`<span class="pill pill-overdue">Overdue</span>`; }
    else if(isNext){ rowClass='row-next'; pill=`<span class="pill pill-next">▶ Next</span>`; }

    // Find collections that cover this EMI (approximation: list all that arrived before or on next EMI date)
    const colsForThis = (l.collections||[]).filter(col=>{
      return col.date <= p.dueDate;
    });

    return `<tr class="${rowClass}">
      <td>${p.emiNo}</td>
      <td>${fmtDate(p.dueDate)}</td>
      <td class="mono">${fmtINR(p.amount)}</td>
      <td>${pill}</td>
    </tr>`;
  });

  // Collections log
  const colLog = [...(l.collections||[])].sort((a,b)=>b.date.localeCompare(a.date));

  return `<div class="sheet-handle"></div>
    <h2 style="margin-bottom:4px;">${T('emiHistory')}</h2>
    <div style="font-size:12px; color:var(--ink-soft); margin-bottom:12px;">${escapeHtml(c?c.name:'Unknown')} · ${fmtINR(l.principal)} @ ${l.rate}% · ${l.numEmis} ${l.frequency} EMIs</div>
    <div class="preview-box" style="margin-bottom:12px;">
      Total payable: <b>${fmtINR(s.totalPayable)}</b> &nbsp;|&nbsp;
      Collected: <b>${fmtINR(s.collected)}</b> &nbsp;|&nbsp;
      Outstanding: <b>${fmtINR(s.outstanding)}</b>
    </div>

    <div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); margin-bottom:6px;">${T('emiSchedule')}</div>
    <div style="overflow-x:auto; margin-bottom:16px;">
      <table class="emi-table">
        <thead><tr><th>#</th><th>Due Date</th><th>EMI Amount</th><th>Status</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>

    <div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); margin-bottom:6px;">${T('paymentCollections')} (${colLog.length})</div>
    ${colLog.length === 0 ? `<div style="font-size:12px; color:var(--ink-soft); padding:8px 0;">${T('noData')}</div>` :
      `<div style="overflow-x:auto; margin-bottom:16px;">
        <table class="emi-table">
          <thead><tr><th>Date</th><th>Amount</th><th>Note</th></tr></thead>
          <tbody>${colLog.map(col=>`<tr class="row-paid"><td>${fmtDate(col.date)}</td><td class="mono" style="color:var(--green);">+${fmtINR(col.amount)}</td><td style="color:var(--ink-soft);">${escapeHtml(col.note||'—')}</td></tr>`).join('')}</tbody>
        </table>
      </div>`
    }

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
      <button class="btn btn-ghost btn-sm" onclick="exportLoanStatement('${loanId}')">⬇️ ${T('exportXlsx').replace('⬇️ ','').replace(' (.xlsx)','')}</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">${T('close')}</button>
    </div>`;
}

/* ---------------- Excel Export ---------------- */
function monthLabel(){ const d=new Date(); return d.toLocaleString('en-IN',{month:'long',year:'numeric'}); }

function exportExcel(type){
  if(typeof XLSX === 'undefined'){ showToast('Excel library loading… try again'); return; }
  const wb = XLSX.utils.book_new();
  const today = todayISO();
  const monthPrefix = today.slice(0,7); // YYYY-MM

  if(type==='daily'){
    const rows = [];
    state.loans.forEach(l=>{
      const c = getCustomer(l.customerId);
      const g = c ? getGroup(c.groupId) : null;
      (l.collections||[]).filter(col=>col.date===today).forEach(col=>{
        rows.push({
          'Tab': g?g.name:'',
          'Customer Name': c?c.name:'',
          'Code': c?c.code:'',
          'Mobile': c?c.mobile:'',
          'Area': c?c.area:'',
          'Loan Amount (₹)': l.principal,
          'EMI (₹)': Math.round(l.payments[0]?.amount||0),
          'Collected (₹)': col.amount,
          'Date': fmtDate(col.date),
          'Note': col.note||''
        });
      });
    });
    if(!rows.length){ showToast('No collections today to export'); return; }
    const ws = XLSX.utils.json_to_sheet(rows);
    autoWidth(ws, rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Daily Collections');
    XLSX.writeFile(wb, `Daily_Report_${today}.xlsx`);
    showToast('Daily report downloaded ✓');

  } else if(type==='monthly'){
    // Sheet 1: collections this month
    const colRows = [];
    state.loans.forEach(l=>{
      const c = getCustomer(l.customerId);
      const g = c ? getGroup(c.groupId) : null;
      (l.collections||[]).filter(col=>col.date.startsWith(monthPrefix)).sort((a,b)=>a.date.localeCompare(b.date)).forEach(col=>{
        colRows.push({
          'Date': fmtDate(col.date),
          'Tab': g?g.name:'',
          'Customer Name': c?c.name:'',
          'Code': c?c.code:'',
          'Mobile': c?c.mobile:'',
          'Loan Amount (₹)': l.principal,
          'Collected (₹)': col.amount,
          'Note': col.note||''
        });
      });
    });
    // Sheet 2: monthly summary per customer
    const summRows = [];
    state.customers.forEach(c=>{
      const g = getGroup(c.groupId);
      const loans = customerLoans(c.id);
      let monthCol = 0, totalOutstanding = 0;
      loans.forEach(l=>{
        monthCol += (l.collections||[]).filter(col=>col.date.startsWith(monthPrefix)).reduce((s,col)=>s+col.amount,0);
        totalOutstanding += loanStatus(l).outstanding;
      });
      if(loans.length){
        summRows.push({
          'Tab': g?g.name:'',
          'Customer Name': c.name,
          'Code': c.code,
          'Mobile': c.mobile||'',
          'Area': c.area||'',
          'Active Loans': loans.filter(l=>!loanStatus(l).completed).length,
          'Month Collection (₹)': monthCol,
          'Outstanding (₹)': Math.round(totalOutstanding),
          'Status': customerActive(c.id)?'Active':'Inactive'
        });
      }
    });
    if(!colRows.length && !summRows.length){ showToast('No data this month to export'); return; }
    if(colRows.length){ const ws1=XLSX.utils.json_to_sheet(colRows); autoWidth(ws1,colRows); XLSX.utils.book_append_sheet(wb,ws1,'Collections'); }
    if(summRows.length){ const ws2=XLSX.utils.json_to_sheet(summRows); autoWidth(ws2,summRows); XLSX.utils.book_append_sheet(wb,ws2,'Customer Summary'); }
    XLSX.writeFile(wb, `Monthly_Report_${monthPrefix}.xlsx`);
    showToast('Monthly report downloaded ✓');

  } else if(type==='all_customers'){
    const rows = state.customers.map(c=>{
      const g = getGroup(c.groupId);
      const loans = customerLoans(c.id);
      const totalLent = loans.reduce((s,l)=>s+l.principal,0);
      const totalCollected = loans.reduce((s,l)=>s+(l.collections||[]).reduce((t,col)=>t+col.amount,0),0);
      const outstanding = loans.reduce((s,l)=>s+loanStatus(l).outstanding,0);
      const referrer = c.referral ? getCustomer(c.referral) : null;
      return {
        'Tab': g?g.name:'',
        'Code': c.code,
        'Customer Name': c.name,
        'Mobile': c.mobile||'',
        'Area': c.area||'',
        'Join Date': fmtDate(c.joinDate),
        'Referred By': referrer?referrer.name:'',
        'Total Loans': loans.length,
        'Total Lent (₹)': totalLent,
        '${T('collected')} (₹)': totalCollected,
        'Outstanding (₹)': Math.round(outstanding),
        'Status': customerActive(c.id)?'Active':'Inactive'
      };
    });
    if(!rows.length){ showToast('No customers to export'); return; }
    const ws = XLSX.utils.json_to_sheet(rows);
    autoWidth(ws, rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Customers');
    XLSX.writeFile(wb, `All_Customers_${today}.xlsx`);
    showToast('Customer list downloaded ✓');

  } else if(type==='full_ledger'){
    // Sheet 1: all collections ever
    const allCols = [];
    state.loans.forEach(l=>{
      const c = getCustomer(l.customerId);
      const g = c ? getGroup(c.groupId) : null;
      (l.collections||[]).sort((a,b)=>a.date.localeCompare(b.date)).forEach(col=>{
        allCols.push({
          'Date': fmtDate(col.date),
          'Tab': g?g.name:'',
          'Customer': c?c.name:'',
          'Code': c?c.code:'',
          'Loan Principal (₹)': l.principal,
          'Rate (%)': l.rate,
          'Collected (₹)': col.amount,
          'Note': col.note||''
        });
      });
    });
    // Sheet 2: all EMI schedules
    const emiRows = [];
    state.loans.forEach(l=>{
      const c = getCustomer(l.customerId);
      const g = c ? getGroup(c.groupId) : null;
      const s = loanStatus(l);
      let cumCol = 0;
      l.payments.forEach(p=>{
        const emiCum = l.payments.slice(0, p.emiNo).reduce((t,x)=>t+x.amount, 0);
        const paidFull = s.collected >= emiCum;
        const partial = !paidFull && s.collected > emiCum - p.amount;
        const status = paidFull ? 'Paid' : partial ? 'Partial' : p.dueDate < today ? 'Overdue' : 'Pending';
        emiRows.push({
          'Tab': g?g.name:'',
          'Customer': c?c.name:'',
          'Code': c?c.code:'',
          'EMI #': p.emiNo,
          'Due Date': fmtDate(p.dueDate),
          'EMI Amount (₹)': p.amount,
          'Status': status
        });
      });
    });
    if(!allCols.length && !emiRows.length){ showToast('No loan data to export'); return; }
    if(allCols.length){ const ws1=XLSX.utils.json_to_sheet(allCols); autoWidth(ws1,allCols); XLSX.utils.book_append_sheet(wb,ws1,'All Collections'); }
    if(emiRows.length){ const ws2=XLSX.utils.json_to_sheet(emiRows); autoWidth(ws2,emiRows); XLSX.utils.book_append_sheet(wb,ws2,'EMI Schedule'); }
    XLSX.writeFile(wb, `Full_Ledger_${today}.xlsx`);
    showToast('Full ledger downloaded ✓');

  } else if(type==='today_report'){
    const td = todayStats();
    // Sheet 1: Loans given today
    const givenRows = td.loansGiven.map(l=>{
      const c=getCustomer(l.customerId); const g=c?getGroup(c.groupId):null;
      return {'Tab':g?g.name:'','Customer Name':c?c.name:'','Code':c?c.code:'','Mobile':c?c.mobile:'','Area':c?c.area:'','Principal (₹)':l.principal,'Interest Rate (%)':l.rate,'No. of EMIs':l.numEmis,'Frequency':l.frequency,'Start Date':fmtDate(l.startDate),'Total Payable (₹)':Math.round(l.principal*(1+l.rate/100))};
    });
    // Sheet 2: Collections today
    const colRows = td.collectedItems.map(({l,c,col})=>{
      const g=c?getGroup(c.groupId):null;
      const intRatio = l.payments.reduce((s,p)=>s+p.amount,0)>0 ? (l.principal*(l.rate/100))/l.payments.reduce((s,p)=>s+p.amount,0) : 0;
      return {'Tab':g?g.name:'','Customer Name':c?c.name:'','Code':c?c.code:'','Mobile':c?c.mobile:'','Collected (₹)':col.amount,'Profit Portion (₹)':Math.round(col.amount*intRatio),'Note':col.note||''};
    });
    // Sheet 3: Unpaid today
    const unpaidRows = td.unpaidItems.map(({l,c,s})=>{
      const g=c?getGroup(c.groupId):null;
      return {'Tab':g?g.name:'','Customer Name':c?c.name:'','Code':c?c.code:'','Mobile':c?c.mobile:'','Unpaid Amount (₹)':Math.round(s.dueToday),'Outstanding (₹)':Math.round(s.outstanding)};
    });
    // Sheet 4: Summary
    const summaryRows=[
      {'Item':'Date','Value':fmtDate(today)},
      {'Item':'Loans Given (count)','Value':td.loansGiven.length},
      {'Item':'Loans Given Amount (₹)','Value':td.loansGivenAmt},
      {'Item':'${T('collected')} (₹)','Value':Math.round(td.collectedAmt)},
      {'Item':'Collections Count','Value':td.collectedItems.length},
      {'Item':'Unpaid Today (₹)','Value':Math.round(td.unpaidAmt)},
      {'Item':'Unpaid Customers','Value':td.unpaidItems.length},
      {'Item':"${T('profit')} (₹)",'Value':Math.round(td.profitAmt)},
    ];
    const ws_sum=XLSX.utils.json_to_sheet(summaryRows); autoWidth(ws_sum,summaryRows); XLSX.utils.book_append_sheet(wb,ws_sum,'Summary');
    if(givenRows.length){ const ws=XLSX.utils.json_to_sheet(givenRows); autoWidth(ws,givenRows); XLSX.utils.book_append_sheet(wb,ws,'${T('loansGiven')}'); }
    if(colRows.length){ const ws=XLSX.utils.json_to_sheet(colRows); autoWidth(ws,colRows); XLSX.utils.book_append_sheet(wb,ws,'Collections Today'); }
    if(unpaidRows.length){ const ws=XLSX.utils.json_to_sheet(unpaidRows); autoWidth(ws,unpaidRows); XLSX.utils.book_append_sheet(wb,ws,'Unpaid Today'); }
    XLSX.writeFile(wb, `Today_Report_${today}.xlsx`);
    showToast("Today's report downloaded ✓");

  } else if(type==='monthly_balance'){
    const mn = monthlyStats();
    const mp = today.slice(0,7);
    const mLabel = new Date(today+'T00:00:00').toLocaleDateString('en-IN',{month:'long',year:'numeric'});

    // Sheet 1: Balance Sheet
    const totalAssets = state.loans.reduce((s,l)=>s+loanStatus(l).outstanding,0);
    const bsRows = [
      {'Category':'INCOME','Item':'Interest Earned (₹)','Amount':Math.round(mn.profitAmt)},
      {'Category':'INCOME','Item':'Principal Collected (₹)','Amount':Math.round(mn.collectedAmt - mn.profitAmt)},
      {'Category':'INCOME','Item':'${T('collected')} (₹)','Amount':Math.round(mn.collectedAmt)},
      {'Category':'INCOME','Item':'New Investments Received (₹)','Amount':Math.round(mn.monthInvested)},
      {'Category':''},
      {'Category':'EXPENDITURE','Item':'Loans Disbursed (₹)','Amount':mn.loansGivenAmt},
      {'Category':'EXPENDITURE','Item':'Withdrawals Made (₹)','Amount':Math.round(mn.monthWithdrawn)},
      {'Category':'EXPENDITURE','Item':'Operating Expenses (₹)','Amount':Math.round(mn.monthExpenses)},
      {'Category':''},
      {'Category':'PROFIT','Item':'Net Profit (Interest − Expenses) (₹)','Amount':Math.round(mn.netProfit)},
      {'Category':''},
      {'Category':'ASSETS','Item':'Total Outstanding Loans (₹)','Amount':Math.round(totalAssets)},
      {'Category':'ASSETS','Item':'Cash in Hand (₹)','Amount':Math.round(cashInHand())},
      {'Category':'ASSETS','Item':'Total Assets (₹)','Amount':Math.round(totalAssets+cashInHand())},
    ];
    const ws_bs=XLSX.utils.json_to_sheet(bsRows); autoWidth(ws_bs,bsRows); XLSX.utils.book_append_sheet(wb,ws_bs,`Balance Sheet ${mp}`);

    // Sheet 2: Monthly collections detail
    const mColRows = mn.collectionItems.map(({l,c,col})=>{
      const g=c?getGroup(c.groupId):null;
      const totalPayable=l.payments.reduce((s,p)=>s+p.amount,0);
      const intRatio=totalPayable>0?(l.principal*(l.rate/100))/totalPayable:0;
      return {'Date':fmtDate(col.date),'Tab':g?g.name:'','Customer':c?c.name:'','Code':c?c.code:'','Collected (₹)':col.amount,'Profit Portion (₹)':Math.round(col.amount*intRatio),'Note':col.note||''};
    }).sort((a,b)=>a['Date'].localeCompare(b['Date']));
    if(mColRows.length){ const ws=XLSX.utils.json_to_sheet(mColRows); autoWidth(ws,mColRows); XLSX.utils.book_append_sheet(wb,ws,'Collections'); }

    // Sheet 3: Monthly expenses
    const expRows = mn.expenseItems.map(t=>({'Date':fmtDate(t.date),'Category':t.category||'Expense','Amount (₹)':t.amount,'Note':t.note||''}));
    if(expRows.length){ const ws=XLSX.utils.json_to_sheet(expRows); autoWidth(ws,expRows); XLSX.utils.book_append_sheet(wb,ws,'Expenses'); }

    // Sheet 4: New loans this month
    const loanRows = mn.disbursedItems.map(l=>{
      const c=getCustomer(l.customerId); const g=c?getGroup(c.groupId):null;
      return {'Date':fmtDate(l.startDate),'Tab':g?g.name:'','Customer':c?c.name:'','Code':c?c.code:'','Principal (₹)':l.principal,'Rate (%)':l.rate,'EMIs':l.numEmis,'Frequency':l.frequency,'Total Payable (₹)':Math.round(l.principal*(1+l.rate/100))};
    });
    if(loanRows.length){ const ws=XLSX.utils.json_to_sheet(loanRows); autoWidth(ws,loanRows); XLSX.utils.book_append_sheet(wb,ws,'Loans Disbursed'); }

    // Sheet 5: Outstanding per customer
    const outRows = state.customers.map(c=>{
      const g=getGroup(c.groupId);
      const loans=customerLoans(c.id);
      const outstanding=loans.reduce((s,l)=>s+loanStatus(l).outstanding,0);
      const overdueAmt=loans.reduce((s,l)=>s+loanStatus(l).overdue,0);
      return {'Tab':g?g.name:'','Customer':c.name,'Code':c.code,'Mobile':c.mobile||'','Active Loans':loans.filter(l=>!loanStatus(l).completed).length,'Outstanding (₹)':Math.round(outstanding),'Overdue (₹)':Math.round(overdueAmt),'Status':customerActive(c.id)?'Active':'Inactive'};
    }).filter(r=>r['Active Loans']>0);
    if(outRows.length){ const ws=XLSX.utils.json_to_sheet(outRows); autoWidth(ws,outRows); XLSX.utils.book_append_sheet(wb,ws,'Outstanding'); }

    XLSX.writeFile(wb, `Balance_Sheet_${mp}.xlsx`);
    showToast('Monthly balance sheet downloaded ✓');
  }
}

function exportByDate(groupId, period){
  if(typeof XLSX === 'undefined'){ showToast('Excel library loading… try again'); return; }

  // Read selected date/month from the picker inputs
  const dateInput  = document.getElementById('rpt_date');
  const monthInput = document.getElementById('rpt_month');
  const selDate  = (dateInput  && dateInput.value)  ? dateInput.value  : todayISO();
  const selMonth = (monthInput && monthInput.value) ? monthInput.value : todayISO().slice(0,7);

  const isDaily   = period === 'daily';
  const filterKey = isDaily ? selDate : selMonth;
  const dateFilter = isDaily ? (d => d === selDate) : (d => d.startsWith(selMonth));

  // Label for file name and display
  const periodLabel = filterKey;
  const periodName  = isDaily
    ? new Date(selDate+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})
    : new Date(selMonth+'-01T00:00:00').toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  // Decide which customers to include
  const isAllLines = groupId === 'all';
  const custs = isAllLines
    ? state.customers
    : groupCustomers(groupId);
  const g = isAllLines ? null : getGroup(groupId);
  const tabLabel = isAllLines ? 'All Lines' : (g ? g.name : '');

  const wb = XLSX.utils.book_new();

  /* ── Collections ── */
  const colRows = [];
  custs.forEach(c => {
    const grp = getGroup(c.groupId);
    customerLoans(c.id).forEach(l => {
      (l.collections||[])
        .filter(col => dateFilter(col.date))
        .sort((a,b) => a.date.localeCompare(b.date))
        .forEach(col => {
          const totalPayable = l.payments.reduce((s,p)=>s+p.amount,0);
          const intRatio = totalPayable > 0 ? (l.principal*(l.rate/100))/totalPayable : 0;
          colRows.push({
            'Date'            : fmtDate(col.date),
            'Line'            : grp ? grp.name : '',
            'Customer Name'   : c.name,
            'Code'            : c.code,
            'Mobile'          : c.mobile||'',
            'Area'            : c.area||'',
            'Loan Amount (₹)' : l.principal,
            'Rate (%)'        : l.rate,
            'Frequency'       : l.frequency,
            'Collected (₹)'   : col.amount,
            'Profit (₹)'      : Math.round(col.amount * intRatio),
            'Note'            : col.note||''
          });
        });
    });
  });

  /* ── Unpaid / Pending ── */
  const unpaidRows = [];
  custs.forEach(c => {
    const grp = getGroup(c.groupId);
    customerLoans(c.id).forEach(l => {
      const s = loanStatus(l);
      l.payments
        .filter(p => dateFilter(p.dueDate))
        .forEach(p => {
          const emiCum = l.payments.slice(0, p.emiNo).reduce((t,x)=>t+x.amount, 0);
          const isPaid = s.collected >= emiCum;
          if(!isPaid){
            unpaidRows.push({
              'Due Date'        : fmtDate(p.dueDate),
              'Line'            : grp ? grp.name : '',
              'Customer Name'   : c.name,
              'Code'            : c.code,
              'Mobile'          : c.mobile||'',
              'EMI #'           : p.emiNo,
              'EMI Amount (₹)'  : p.amount,
              'Outstanding (₹)' : Math.round(s.outstanding),
              'Status'          : p.dueDate < todayISO() ? 'Overdue' : 'Pending'
            });
          }
        });
    });
  });

  /* ── Loans Given (monthly only) ── */
  const loanRows = [];
  if(!isDaily){
    custs.forEach(c => {
      const grp = getGroup(c.groupId);
      customerLoans(c.id)
        .filter(l => l.startDate.startsWith(selMonth))
        .forEach(l => {
          loanRows.push({
            'Date'             : fmtDate(l.startDate),
            'Line'             : grp ? grp.name : '',
            'Customer Name'    : c.name,
            'Code'             : c.code,
            'Mobile'           : c.mobile||'',
            'Principal (₹)'    : l.principal,
            'Rate (%)'         : l.rate,
            'No. of EMIs'      : l.numEmis,
            'Frequency'        : l.frequency,
            'Total Payable (₹)': Math.round(l.principal*(1+l.rate/100))
          });
        });
    });
  }

  /* ── Summary ── */
  const totalCollected = colRows.reduce((s,r)=>s+r['Collected (₹)'],0);
  const totalProfit    = colRows.reduce((s,r)=>s+r['Profit (₹)'],0);
  const totalUnpaid    = unpaidRows.reduce((s,r)=>s+r['EMI Amount (₹)'],0);
  const totalLent      = loanRows.reduce((s,r)=>s+r['Principal (₹)'],0);

  const summaryRows = [
    { 'Item': 'Line / Tab',                   'Value': tabLabel },
    { 'Item': 'Report Period',                 'Value': periodName },
    { 'Item': '${T('collected')} (₹)',           'Value': Math.round(totalCollected) },
    { 'Item': 'No. of Collections',           'Value': colRows.length },
    { 'Item': 'Profit / Interest Earned (₹)', 'Value': Math.round(totalProfit) },
    { 'Item': 'Unpaid / Overdue EMIs (₹)',    'Value': Math.round(totalUnpaid) },
    { 'Item': 'Unpaid Count',                 'Value': unpaidRows.length },
    ...(!isDaily ? [
      { 'Item': 'New Loans Given (₹)',        'Value': Math.round(totalLent) },
      { 'Item': 'New Loans Count',            'Value': loanRows.length },
    ] : []),
  ];

  if(!colRows.length && !unpaidRows.length){
    showToast(`No data found for ${periodName}`);
    return;
  }

  const wsSum = XLSX.utils.json_to_sheet(summaryRows);
  autoWidth(wsSum, summaryRows);
  XLSX.utils.book_append_sheet(wb, wsSum, 'Summary');

  if(colRows.length){
    const wsC = XLSX.utils.json_to_sheet(colRows);
    autoWidth(wsC, colRows);
    XLSX.utils.book_append_sheet(wb, wsC, 'Collections');
  }
  if(unpaidRows.length){
    const wsU = XLSX.utils.json_to_sheet(unpaidRows);
    autoWidth(wsU, unpaidRows);
    XLSX.utils.book_append_sheet(wb, wsU, 'Unpaid');
  }
  if(loanRows.length){
    const wsL = XLSX.utils.json_to_sheet(loanRows);
    autoWidth(wsL, loanRows);
    XLSX.utils.book_append_sheet(wb, wsL, 'Loans Given');
  }

  const safeName = tabLabel.replace(/[^a-zA-Z0-9]/g,'_').slice(0,18);
  const safeDate = filterKey.replace(/[^0-9\-]/g,'');
  XLSX.writeFile(wb, `Report_${safeName}_${safeDate}.xlsx`);
  showToast(`Report for ${periodName} downloaded ✓`);
}

function exportTabExcel(groupId, period){
  if(typeof XLSX === 'undefined'){ showToast('Excel library loading… try again'); return; }
  const g = getGroup(groupId);
  if(!g){ showToast('Tab not found'); return; }
  const today = todayISO();
  const monthPrefix = today.slice(0,7);
  const isDaily = period === 'daily';
  const dateFilter = isDaily ? (d => d === today) : (d => d.startsWith(monthPrefix));
  const periodLabel = isDaily ? today : monthPrefix;
  const periodName  = isDaily ? 'Daily' : 'Monthly';

  const custs = groupCustomers(groupId);
  const wb = XLSX.utils.book_new();

  /* ── Sheet 1: Collections ── */
  const colRows = [];
  custs.forEach(c => {
    customerLoans(c.id).forEach(l => {
      (l.collections||[]).filter(col => dateFilter(col.date))
        .sort((a,b) => a.date.localeCompare(b.date))
        .forEach(col => {
          const totalPayable = l.payments.reduce((s,p)=>s+p.amount,0);
          const intRatio = totalPayable > 0 ? (l.principal*(l.rate/100))/totalPayable : 0;
          colRows.push({
            'Date'          : fmtDate(col.date),
            'Customer Name' : c.name,
            'Code'          : c.code,
            'Mobile'        : c.mobile||'',
            'Area'          : c.area||'',
            'Loan Amount (₹)': l.principal,
            'Rate (%)'      : l.rate,
            'EMI Freq'      : l.frequency,
            'Collected (₹)' : col.amount,
            'Profit (₹)'    : Math.round(col.amount * intRatio),
            'Note'          : col.note||''
          });
        });
    });
  });

  /* ── Sheet 2: Unpaid / pending for the period ── */
  const unpaidRows = [];
  custs.forEach(c => {
    customerLoans(c.id).forEach(l => {
      const pending = l.payments.filter(p => {
        if(isDaily) return p.dueDate === today;
        return p.dueDate.startsWith(monthPrefix);
      });
      const s = loanStatus(l);
      pending.forEach(p => {
        const emiCum  = l.payments.slice(0, p.emiNo).reduce((t,x)=>t+x.amount, 0);
        const isPaid  = s.collected >= emiCum;
        if(!isPaid){
          unpaidRows.push({
            'Due Date'      : fmtDate(p.dueDate),
            'Customer Name' : c.name,
            'Code'          : c.code,
            'Mobile'        : c.mobile||'',
            'Area'          : c.area||'',
            'EMI #'         : p.emiNo,
            'EMI Amount (₹)': p.amount,
            'Outstanding (₹)': Math.round(s.outstanding),
            'Status'        : p.dueDate < today ? 'Overdue' : 'Pending'
          });
        }
      });
    });
  });

  /* ── Sheet 3: Loans given in this period (not in daily — too rare) ── */
  const loanRows = [];
  if(!isDaily){
    custs.forEach(c => {
      customerLoans(c.id).filter(l => l.startDate.startsWith(monthPrefix)).forEach(l => {
        loanRows.push({
          'Date'          : fmtDate(l.startDate),
          'Customer Name' : c.name,
          'Code'          : c.code,
          'Mobile'        : c.mobile||'',
          'Principal (₹)' : l.principal,
          'Rate (%)'      : l.rate,
          'No. of EMIs'   : l.numEmis,
          'Frequency'     : l.frequency,
          'Total Payable (₹)': Math.round(l.principal*(1+l.rate/100))
        });
      });
    });
  }

  /* ── Sheet 4: Summary ── */
  const totalCollected  = colRows.reduce((s,r)=>s+r['Collected (₹)'],0);
  const totalProfit     = colRows.reduce((s,r)=>s+r['Profit (₹)'],0);
  const totalUnpaid     = unpaidRows.reduce((s,r)=>s+r['EMI Amount (₹)'],0);
  const totalLent       = loanRows.reduce((s,r)=>s+r['Principal (₹)'],0);
  const summaryRows = [
    { 'Item': 'Tab',                        'Value': g.name },
    { 'Item': 'Period',                     'Value': periodLabel },
    { 'Item': 'Total Collections (₹)',      'Value': Math.round(totalCollected) },
    { 'Item': 'Collection Count',           'Value': colRows.length },
    { 'Item': 'Profit / Interest Earned (₹)','Value': Math.round(totalProfit) },
    { 'Item': 'Unpaid / Pending EMIs (₹)', 'Value': Math.round(totalUnpaid) },
    { 'Item': 'Unpaid Count',              'Value': unpaidRows.length },
    ...(!isDaily ? [
      { 'Item': 'New Loans Given (₹)',     'Value': Math.round(totalLent) },
      { 'Item': 'New Loans Count',         'Value': loanRows.length },
    ] : []),
    { 'Item': 'Total Customers in Tab',    'Value': custs.length },
    { 'Item': 'Active Customers',          'Value': custs.filter(c=>customerActive(c.id)).length },
  ];

  const wsSum = XLSX.utils.json_to_sheet(summaryRows);
  autoWidth(wsSum, summaryRows);
  XLSX.utils.book_append_sheet(wb, wsSum, 'Summary');

  if(colRows.length){
    const wsC = XLSX.utils.json_to_sheet(colRows);
    autoWidth(wsC, colRows);
    XLSX.utils.book_append_sheet(wb, wsC, 'Collections');
  }
  if(unpaidRows.length){
    const wsU = XLSX.utils.json_to_sheet(unpaidRows);
    autoWidth(wsU, unpaidRows);
    XLSX.utils.book_append_sheet(wb, wsU, 'Unpaid');
  }
  if(loanRows.length){
    const wsL = XLSX.utils.json_to_sheet(loanRows);
    autoWidth(wsL, loanRows);
    XLSX.utils.book_append_sheet(wb, wsL, 'Loans Given');
  }

  if(!colRows.length && !unpaidRows.length){
    showToast(`No data for this tab in ${isDaily?'today':monthPrefix}`);
    return;
  }

  const safeName = g.name.replace(/[^a-zA-Z0-9]/g,'_').slice(0,20);
  XLSX.writeFile(wb, `${periodName}_${safeName}_${periodLabel}.xlsx`);
  showToast(`${g.name} ${periodName} report downloaded ✓`);
}

function exportLoanStatement(loanId){
  if(typeof XLSX === 'undefined'){ showToast('Excel library loading… try again'); return; }
  const l = state.loans.find(x=>x.id===loanId);
  const c = getCustomer(l.customerId);
  const s = loanStatus(l);
  const today = todayISO();
  const wb = XLSX.utils.book_new();

  // EMI Schedule sheet
  const emiRows = l.payments.map(p=>{
    const emiCum = l.payments.slice(0, p.emiNo).reduce((t,x)=>t+x.amount, 0);
    const paidFull = s.collected >= emiCum;
    const partial = !paidFull && s.collected > emiCum - p.amount;
    const status = paidFull ? 'Paid' : partial ? 'Partial' : p.dueDate < today ? 'Overdue' : 'Pending';
    return { 'EMI #': p.emiNo, 'Due Date': fmtDate(p.dueDate), 'Amount (₹)': p.amount, 'Status': status };
  });
  const ws1 = XLSX.utils.json_to_sheet(emiRows);
  autoWidth(ws1, emiRows);
  XLSX.utils.book_append_sheet(wb, ws1, 'EMI Schedule');

  // Collections sheet
  const colRows = [...(l.collections||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(col=>({
    'Date': fmtDate(col.date), 'Amount Collected (₹)': col.amount, 'Note': col.note||''
  }));
  if(colRows.length){
    const ws2 = XLSX.utils.json_to_sheet(colRows);
    autoWidth(ws2, colRows);
    XLSX.utils.book_append_sheet(wb, ws2, 'Collections');
  }

  const fname = `Loan_Statement_${c?c.code:'loan'}_${today}.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast('Loan statement downloaded ✓');
}

function autoWidth(ws, data){
  if(!data.length) return;
  const cols = Object.keys(data[0]);
  ws['!cols'] = cols.map(key=>{
    const max = Math.max(key.length, ...data.map(r=>String(r[key]||'').length));
    return {wch: Math.min(max+2, 40)};
  });
}

function confirmDeleteCustomer(id){
  ui.modal = {type:'confirm', payload:{
    title:'Delete customer?',
    msg:'This will also delete all of their loans and payment history. This cannot be undone.',
    action:`deleteCustomer('${id}')`
  }};
  render();
}
async function deleteCustomer(id){
  state.customers = state.customers.filter(c=>c.id!==id);
  state.loans = state.loans.filter(l=>l.customerId!==id);
  ui.expandedCustomerId = null;
  await saveData(); closeModal(); showToast('Customer deleted');
}
async function toggleCustomerStatus(id){
  const c = getCustomer(id);
  if(!c) return;
  const cur = customerActive(id);
  c.statusOverride = cur ? 'inactive' : 'active';
  await saveData();
  render();
  showToast(c.statusOverride==='active' ? 'Marked Active' : 'Marked Inactive');
}
function confirmDeleteLoan(id){
  ui.modal = {type:'confirm', payload:{
    title:'Delete loan?',
    msg:'This will permanently remove this loan and its payment history.',
    action:`deleteLoan('${id}')`
  }};
  render();
}
async function deleteLoan(id){
  state.loans = state.loans.filter(l=>l.id!==id);
  await saveData(); closeModal(); showToast('Loan deleted');
}
function confirmDeleteGroup(id){
  const count = groupCustomers(id).length;
  if(count){ showToast(`Move or delete its ${count} customer(s) first`); return; }
  ui.modal = {type:'confirm', payload:{
    title:'Delete this tab?',
    msg:'This will remove the empty tab.',
    action:`deleteGroup('${id}')`
  }};
  render();
}
async function deleteGroup(id){
  state.groups = state.groups.filter(g=>g.id!==id);
  if(ui.activeTab===id) ui.activeTab='dashboard';
  await saveData(); closeModal(); showToast('Tab deleted');
}

function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
